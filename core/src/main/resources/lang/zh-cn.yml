chat:
  password-blocked: "&c请不要将自己的密码告诉别人哦!"

tab-complete:
  change-password:
    old: "<旧密码>"
    new: "<新密码>"
  force-change-password:
    player: "<玩家>"
    new: "<新密码>"
  set-uuid:
    player: "<玩家>"
    uuid: "[UUID]"

command:
  player-command: "&c该命令为玩家命令，不可在控制台执行!"
  default: "&c未知的子命令!"
  no-permission: "&c你没有权限执行该命令!"

  player-not-exists: "&c玩家 %player% 不存在!"

  change-password:
    success: "&a成功修改了密码! 请一定要牢牢记住哦!"
    invalid-format-need-old-password: "&c错误的格式! 请使用 &e/changepass <旧密码> <新密码>"
    invalid-format-no-old-password: "&c错误的格式! 请使用 &e/changepass <新密码>"
    invalid-password: "&c错误的密码! 是不是记错了呢~"
    invalid-password-format: "&c密码不符合要求! 换个安全又好记的密码吧~"

  force-change-password:
    success: "&a成功修改了 %player% 的密码!"
    invalid-format: "&c错误的格式! 请使用 &e/authx changepass <玩家用户名> <新密码>"

  force-unregister:
    invalid-format: "&c错误的格式! 请使用 &e/authx unregister <玩家用户名>"

  reload:
    success: "&a成功重载了 &bAuthX &a!"

  set-uuid:
    invalid-format: "&c错误的格式! 请使用 &e/authx setuuid <玩家用户名> [UUID]"
    success: "&a成功将 %player% 的 UUID 设置为 %uuid% !"
    invalid-uuid: "&c无效的 UUID 格式! 请检查 UUID 是否正确!"

  migrate-ml:
    invalid-format: "&c错误的格式! 请使用 &e/authx migrateml [dryrun]"
    already-running: "&e已有迁移任务在运行中，请稍后再试。"
    start: "&a已开始 MultiLogin UUID 迁移任务（%mode%）。"
    success: "&a迁移 %mode% 完成：总数=%total%，导入=%imported%，已存在跳过=%skipped_existing%，无效跳过=%skipped_invalid%，错误=%errors%，耗时=%duration%s。"
    failed: "&c迁移失败：%reason%"

  recover:
    failed: "&c尝试恢复密码时遇到错误：%reason%"
    success: "&a成功从备份恢复了 %count% 名玩家的密码!"
